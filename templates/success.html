<!DOCTYPE html>
<html>
<head>
    <title>Welcome</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container success">
        <h2>Welcome, {{ username }}!</h2>
        {% if msg %}
            <p>{{ msg }}</p>
        {% else %}
            <p>Login Successful ✅</p>
        {% endif %}
</div>
</body>
</html>
